<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0284c7"/>

  <!-- Swimmer: head -->
  <circle cx="23" cy="9" r="3.2" fill="white"/>

  <!-- Swimmer: body -->
  <line x1="20" y1="11.5" x2="7" y2="17" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Swimmer: front arm (reaching forward) -->
  <line x1="23" y1="12" x2="28" y2="15.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Swimmer: trailing arm (pulling back) -->
  <line x1="13" y1="15" x2="9" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wave -->
  <path d="M3 25.5 C6 22.5 9 22.5 12 25.5 C15 28.5 18 28.5 21 25.5 C24 22.5 27 22.5 29.5 25.5"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
